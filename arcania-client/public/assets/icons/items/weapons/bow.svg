<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Bow limb (curved arc) -->
  <path d="M14 42 C6 34, 6 14, 14 6" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bow inner curve detail -->
  <path d="M15.5 38 C9 32, 9 16, 15.5 10" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bow grip thickening -->
  <path d="M13 22 C11 23, 11 25, 13 26" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Grip wrap detail -->
  <line x1="12.5" y1="23" x2="13.5" y2="23.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="12.5" y1="25" x2="13.5" y2="25.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bowstring -->
  <line x1="14" y1="6" x2="14" y2="42" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Nock tips -->
  <circle cx="14" cy="5.5" r="1" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="14" cy="42.5" r="1" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <!-- Arrow -->
  <line x1="14" y1="24" x2="42" y2="24" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <path d="M42 24 L38 21 L38 27Z" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Arrow fletching -->
  <path d="M17 24 L19 21 L19 24" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <path d="M17 24 L19 27 L19 24" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
</svg>