<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Stock / tiller -->
  <line x1="8" y1="36" x2="32" y2="20" stroke="#c8b89a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Stock detail lines -->
  <line x1="10" y1="34.5" x2="28" y2="21.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Trigger guard -->
  <path d="M16 32 C14 34, 14 36, 16 36" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trigger detail -->
  <line x1="15.5" y1="33" x2="15" y2="35" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bow limb (prod) - top -->
  <path d="M32 20 C36 10, 42 8, 44 8" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bow limb (prod) - bottom -->
  <path d="M32 20 C38 22, 42 30, 42 34" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bowstring -->
  <line x1="44" y1="8" x2="42" y2="34" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Limb detail -->
  <path d="M34 18 C37 12, 41 10, 43 9.5" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M34 22 C38 24, 41 29, 41.5 33" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Bolt (loaded) -->
  <line x1="28" y1="22" x2="42" y2="14" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Bolt tip -->
  <path d="M42 14 L40 11.5 L39 14.5Z" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
  <!-- Stirrup at front -->
  <circle cx="32" cy="20" r="2" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2"/>
</svg>