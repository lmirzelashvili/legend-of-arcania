<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Blade -->
  <path d="M28 8 L24 24 L20 8Z" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Blade tip -->
  <line x1="24" y1="8" x2="24" y2="5" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Blade center line / fuller -->
  <line x1="24" y1="9" x2="24" y2="22" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Blade edge highlights -->
  <line x1="22" y1="12" x2="23.5" y2="22" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Crossguard -->
  <line x1="17" y1="25" x2="31" y2="25" stroke="#c8b89a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Crossguard detail -->
  <circle cx="17" cy="25" r="1" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="31" cy="25" r="1" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <!-- Grip -->
  <line x1="24" y1="26" x2="24" y2="37" stroke="#c8b89a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grip wrap detail -->
  <line x1="22.5" y1="28" x2="25.5" y2="29.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22.5" y1="31" x2="25.5" y2="32.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22.5" y1="34" x2="25.5" y2="35.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Pommel -->
  <circle cx="24" cy="39" r="2.2" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2"/>
</svg>