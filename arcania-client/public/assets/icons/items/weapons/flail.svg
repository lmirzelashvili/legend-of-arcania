  <line x1="37" y1="14" x2="39" y2="16" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="6" x2="27" y2="4" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="14" x2="27" y2="16" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
