<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Barrel -->
  <rect x="4" y="16" width="28" height="5" rx="1.5" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Barrel bore -->
  <circle cx="5" cy="18.5" r="1.2" fill="none" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <!-- Barrel detail lines -->
  <line x1="10" y1="17" x2="10" y2="20" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="18" y1="17" x2="18" y2="20" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Barrel flare / muzzle flare ring -->
  <path d="M4 15 L4 22" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Receiver / body -->
  <rect x="28" y="14" width="12" height="8" rx="2" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Receiver detail -->
  <line x1="30" y1="16" x2="38" y2="16" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Hammer -->
  <path d="M40 14 C42 12, 44 12, 44 14" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trigger guard -->
  <path d="M32 22 C32 28, 30 30, 28 30 C26 30, 26 28, 28 26" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Trigger -->
  <line x1="30" y1="23" x2="29" y2="27" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Grip / stock -->
  <path d="M34 22 L38 34 L34 36 L30 26" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Grip texture lines -->
  <line x1="33" y1="27" x2="36" y2="28" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="30" x2="37" y2="31" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Ornamental rune / fantasy element on body -->
  <circle cx="34" cy="18" r="1.5" fill="none" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
</svg>