<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Long handle -->
  <line x1="14" y1="46" x2="26" y2="10" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Handle grain detail -->
  <line x1="16" y1="40" x2="15.5" y2="42" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="18.5" y1="34" x2="18" y2="36" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="21" y1="26" x2="20.5" y2="28" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Butt cap -->
  <circle cx="13.5" cy="46.5" r="1.2" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <!-- Blade socket / collar -->
  <ellipse cx="26" cy="10" rx="2" ry="1.5" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2"/>
  <!-- Scythe blade (large sweeping curve) -->
  <path d="M26 10 C28 6, 36 2, 42 4 C44 5, 44 8, 40 12 C36 16, 30 14, 28 12" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Blade edge detail (inner curve) -->
  <path d="M28 9 C32 5, 38 4, 41 5.5" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Blade spine detail -->
  <path d="M40 7 C38 10, 34 13, 30 13" fill="none" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Blade tip accent -->
  <line x1="42" y1="4" x2="43.5" y2="3" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>