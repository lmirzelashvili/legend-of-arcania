<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Staff shaft -->
  <line x1="24" y1="46" x2="24" y2="14" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Shaft detail / wood grain -->
  <line x1="23" y1="42" x2="23" y2="38" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="25" y1="36" x2="25" y2="32" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="23" y1="28" x2="23" y2="24" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Staff foot cap -->
  <line x1="22" y1="46" x2="26" y2="46" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Ornamental prongs holding orb -->
  <path d="M20 14 C20 10, 22 8, 24 7" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 14 C28 10, 26 8, 24 7" fill="none" stroke="#c8b89a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cross brace on prongs -->
  <line x1="21" y1="12" x2="27" y2="12" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Orb -->
  <circle cx="24" cy="6" r="4" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2"/>
  <!-- Orb inner glow -->
  <circle cx="23" cy="5" r="1.5" fill="none" stroke="#c8b89a" stroke-width="1.5" opacity="0.5"/>
  <!-- Orb sparkle -->
  <line x1="24" y1="3" x2="24" y2="2" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="27" y1="4" x2="28" y2="3.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Wrap detail at base of headpiece -->
  <line x1="22.5" y1="15" x2="25.5" y2="16" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22.5" y1="17.5" x2="25.5" y2="18.5" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>