<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Blade -->
  <line x1="14" y1="38" x2="36" y2="8" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Blade edge highlight -->
  <line x1="15.5" y1="36.5" x2="35" y2="10" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Blade tip -->
  <path d="M36 8 L38 6 L35 9Z" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Blade body width -->
  <path d="M34 11 L36 8 L33 13" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.5"/>
  <!-- Fuller (center line on blade) -->
  <line x1="18" y1="33" x2="33" y2="13" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Crossguard -->
  <line x1="10" y1="35" x2="20" y2="40" stroke="#c8b89a" stroke-width="2" stroke-linecap="round"/>
  <!-- Grip -->
  <line x1="12" y1="40" x2="9" y2="43" stroke="#c8b89a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Grip wrap detail -->
  <line x1="11.5" y1="40.5" x2="10" y2="42" stroke="#c8b89a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Pommel -->
  <circle cx="8" cy="44" r="1.8" fill="#c8b89a" fill-opacity="0.15" stroke="#c8b89a" stroke-width="2"/>
</svg>